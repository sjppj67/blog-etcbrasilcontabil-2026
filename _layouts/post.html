---
layout: default
---

<div class="container mx-auto px-4 py-10">
  <div class="max-w-4xl mx-auto">
    <article class="bg-white rounded-2xl shadow-2xl overflow-hidden">
      
      <header class="p-8 border-b border-slate-200">
        <h1 class="text-4xl md:text-5xl font-bold text-slate-900 mb-6">
          {{ page.title }}
        </h1>
        
        <div class="flex items-center gap-4 text-slate-600">
          <span>{{ page.date | date: "%d/%m/%Y" }}</span>
          <span>•</span>
          <span>{{ page.author | default: "Professor Sidney Jones" }}</span>
        </div>
      </header>

      {% if page.image.path %}
      <div class="p-8 pt-0">
        <img src="{{ page.image.path }}" 
             alt="{{ page.image.alt | default: page.title }}"
             class="w-full h-auto rounded-xl">
      </div>
      {% endif %}

      <div class="p-8 prose prose-lg max-w-none">
        {{ content }}
      </div>
      
    </article>
  </div>
</div>
