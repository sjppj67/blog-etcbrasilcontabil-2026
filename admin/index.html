<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Console de Conteúdo</title>
</head>
<body>
  <div id="decap-cms-config"></div>

  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

  <script>
    function initDecapCMS( ) {
      console.log("Decap CMS carregado, iniciando...");
      
      var config = {
        backend: {
          name: "git-gateway",
          branch: "main"
        },
        media_folder: "assets/img/uploads",
        public_folder: "/assets/img/uploads",
        collections: [
          {
            name: "posts",
            label: "Artigos do Blog",
            folder: "_posts",
            create: true,
            slug: "{{year}}-{{month}}-{{day}}-{{slug}}",
            fields: [
              { label: "Layout", name: "layout", widget: "hidden", default: "post" },
              { label: "Publicado", name: "published", widget: "hidden", default: true },
              { label: "Título Principal", name: "title", widget: "string" },
              { label: "Autor", name: "author", widget: "string", default: "Professor Sidney Jones" },
              { label: "Data de Publicação", name: "date", widget: "datetime" },
              { label: "Slug", name: "slug", widget: "string" },
              { label: "Resumo", name: "excerpt", widget: "text" },
              {
                label: "Imagem Principal",
                name: "image",
                widget: "object",
                fields: [
                  { label: "Caminho", name: "path", widget: "image" },
                  { label: "Alt", name: "alt", widget: "string" }
                ]
              },
              { label: "Categorias", name: "categories", widget: "list" },
              { label: "Tags", name: "tags", widget: "list" },
              { label: "Conteúdo", name: "body", widget: "markdown" }
            ]
          }
        ]
      };

      var configElement = document.getElementById('decap-cms-config');
      configElement.setAttribute('type', 'text/yaml');
      configElement.textContent = DecapCMS.YAML.stringify(config);
      DecapCMS.init();
    }
  </script>

  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js" onload="initDecapCMS( )"></script>
</body>
</html>
