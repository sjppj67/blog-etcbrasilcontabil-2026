---
layout: default
title: Cadastro - Área VIP
permalink: /cadastro/
---

<div class="min-h-screen bg-gray-50 flex flex-col justify-center py-12 sm:px-6 lg:px-8">
  <div class="sm:mx-auto sm:w-full sm:max-w-md">
    <h2 class="mt-6 text-center text-3xl font-extrabold text-gray-900">
      Crie sua conta gratuita
    </h2>
    <p class="mt-2 text-center text-sm text-gray-600">
      E tenha acesso a todos os benefícios da Área VIP!
    </p>
  </div>

  <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md" x-data="cadastroForm()">
    <div class="bg-white py-8 px-4 shadow sm:rounded-lg sm:px-10">
      <form class="space-y-6" @submit.prevent="handleCadastro">
        <div>
          <label for="email" class="block text-sm font-medium text-gray-700">
            Endereço de e-mail
          </label>
          <div class="mt-1">
            <input id="email" name="email" type="email" x-model="email" autocomplete="email" required
                   class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
          </div>
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-gray-700">
            Crie uma senha
          </label>
          <div class="mt-1">
            <input id="password" name="password" type="password" x-model="password" autocomplete="new-password" required
                   class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm"
                   placeholder="Mínimo de 6 caracteres">
          </div>
        </div>

        <!-- Mensagem de Erro -->
        <template x-if="errorMessage">
          <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative" role="alert">
            <span class="block sm:inline" x-text="errorMessage"></span>
          </div>
        </template>

        <div>
          <button type="submit"
                  :disabled="loading"
                  class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 disabled:opacity-50">
            <span x-show="!loading">Criar minha conta</span>
            <span x-show="loading">Aguarde...</span>
          </button>
        </div>
      </form>
      <div class="mt-6 text-center">
        <p class="text-sm">
          Já tem uma conta? <a href="/login/" class="font-medium text-indigo-600 hover:text-indigo-500">Faça o login</a>.
        </p>
      </div>
    </div>
  </div>
</div>

<!-- Script Simplificado para /cadastro.html -->
<script>
    document.addEventListener('alpine:init', () => {
        Alpine.data('cadastroForm', () => ({
            email: '',
            password: '',
            errorMessage: '',
            loading: false,
            handleCadastro() {
                this.loading = true;
                this.errorMessage = '';
                
                // Confia no Ponto Único de Controle (firebase-init.html)
                const { auth, functions } = window.firebaseApp;

                functions.createUserWithEmailAndPassword(auth, this.email, this.password)
                    .then(userCredential => {
                        console.log('P1: Cadastro com sucesso!', userCredential.user.email);
                        window.location.href = '/dashboard/';
                    })
                    .catch(error => {
                        console.error('P1: Erro no cadastro:', error.code);
                        if (error.code === 'auth/email-already-in-use') {
                            this.errorMessage = 'Este e-mail já está em uso. Tente fazer login.';
                        } else if (error.code === 'auth/weak-password') {
                            this.errorMessage = 'A senha é muito fraca. Use pelo menos 6 caracteres.';
                        }
                        else {
                            this.errorMessage = 'Ocorreu um erro. Verifique os dados e tente novamente.';
                        }
                    })
                    .finally(() => { this.loading = false; });
            }
        }));
    });
</script>
