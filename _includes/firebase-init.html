<!-- _includes/firebase-init.html -->
<script type="module">
  // Import the functions you need from the SDKs you need
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, doc, getDoc, setDoc, increment } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  // ==================================================================
  // A CONFIGURAÇÃO DO FIREBASE SERÁ INJETADA AQUI PELO NETLIFY
  // ==================================================================
  const firebaseConfig = {
    apiKey: "{{- settings.env.JEKYLL_FIREBASE_API_KEY -}}",
    authDomain: "{{- settings.env.JEKYLL_FIREBASE_AUTH_DOMAIN -}}",
    projectId: "{{- settings.env.JEKYLL_FIREBASE_PROJECT_ID -}}",
    storageBucket: "{{- settings.env.JEKYLL_FIREBASE_STORAGE_BUCKET -}}",
    messagingSenderId: "{{- settings.env.JEKYLL_FIREBASE_MESSAGING_SENDER_ID -}}",
    appId: "{{- settings.env.JEKYLL_FIREBASE_APP_ID -}}",
    measurementId: "{{- settings.env.JEKYLL_FIREBASE_MEASUREMENT_ID -}}"
  };
  // ==================================================================

  // Initialize Firebase
  const app = initializeApp(firebaseConfig );
  const db = getFirestore(app);

  // Disponibiliza as funções globalmente para o nossos_scripts.js
  window.firebase = {
    db,
    doc,
    getDoc,
    setDoc,
    increment
  };
</script>
